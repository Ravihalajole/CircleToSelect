name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # We run assembleRelease to generate the APKs
        # If you haven't set up signing keys yet, use assembleDebug 
        # or assembleRelease will produce unsigned APKs.
        run: ./gradlew assembleRelease

      - name: Prepare Artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CircleToSearch-Release-APKs
          path: release-artifacts/
          retention-days: 7
